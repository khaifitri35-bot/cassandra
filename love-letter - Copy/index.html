<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💖 Question</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial;
    overflow:hidden;
}

.box{
    text-align:center;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    position:absolute;
}

button{
    margin:10px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

#yes{
    background:#ff4d6d;
    color:white;
}

#no{
    background:#ccc;
}
</style>
</head>

<body>

<div class="box" id="box">
    <h2>Kamu udah sayang sama aku atau belum?? ❤️</h2>

    <button id="yes" onclick="goNext()">Udah 💖</button>
    <button id="no" onclick="runAway()">Belum 😤</button>
</div>

<script>
function goNext(){
    window.location.href = "main.html";
}

function runAway(){

    const box = document.getElementById("box");

    const x = Math.random() * (window.innerWidth - 200);
    const y = Math.random() * (window.innerHeight - 150);

    box.style.left = x + "px";
    box.style.top = y + "px";
}
</script>

</body>
</html>
